services:
  - type: web
    name: yasen-alpha-scam-detector
    runtime: python
    repo: https://github.com/emyasenc/YASEN-ALPHA-Scam-Detector
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT